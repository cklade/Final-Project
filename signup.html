<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Klade Photography</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="section">
      <div class="container is-max-desktop">
        <div class="mb-5 has-text-centered">
          <h1 class="title is-2 has-text-black">Klade Photography</h1>
        </div>

        <div class="columns is-centered">
          <div class="column is-8-desktop is-9-tablet">
            <div class="box" style="padding: 2.5rem; border: 2px solid black">
              <h2 class="title is-4 has-text-black has-text-centered mb-5">
                Create Your Account
              </h2>

              <div
                id="errorMessage"
                class="notification is-danger is-light"
                style="display: none"
              >
                <button class="delete" onclick="hideError()"></button>
                <p id="errorText"></p>
              </div>

              <form id="signupForm">
                <div class="columns">
                  <div class="column">
                    <div class="field">
                      <label class="label">First Name</label>
                      <div class="control">
                        <input
                          class="input"
                          type="text"
                          id="firstName"
                          placeholder="First name"
                          required
                        />
                      </div>
                    </div>
                  </div>

                  <div class="column">
                    <div class="field">
                      <label class="label">Last Name</label>
                      <div class="control">
                        <input
                          class="input"
                          type="text"
                          id="lastName"
                          placeholder="Last name"
                          required
                        />
                      </div>
                    </div>
                  </div>
                </div>

                <div class="columns">
                  <div class="column">
                    <div class="field">
                      <label class="label">Email</label>
                      <div class="control">
                        <input
                          class="input"
                          type="email"
                          id="email"
                          placeholder="your.email@example.com"
                          required
                        />
                      </div>
                    </div>
                  </div>

                  <div class="column">
                    <div class="field">
                      <label class="label">Phone</label>
                      <div class="control">
                        <input
                          class="input"
                          type="tel"
                          id="phone"
                          placeholder="Enter your phone number"
                          required
                        />
                      </div>
                    </div>
                  </div>
                </div>

                <hr />

                <h3 class="title is-5 has-text-black mb-4">Address Information</h3>

                <div class="field">
                  <label class="label">Street Address</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      id="street"
                      placeholder="123 Main St"
                      required
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Unit / Apartment Number</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      id="unitNumber"
                      placeholder="Apartment, suite, unit, etc. (optional)"
                    />
                  </div>
                </div>

                <div class="columns">
                  <div class="column">
                    <div class="field">
                      <label class="label">City</label>
                      <div class="control">
                        <input
                          class="input"
                          type="text"
                          id="city"
                          placeholder="City"
                          required
                        />
                      </div>
                    </div>
                  </div>

                  <div class="column">
                    <div class="field">
                      <label class="label">State</label>
                      <div class="control">
                        <input
                          class="input"
                          type="text"
                          id="state"
                          placeholder="State"
                          required
                        />
                      </div>
                    </div>
                  </div>

                  <div class="column">
                    <div class="field">
                      <label class="label">ZIP Code</label>
                      <div class="control">
                        <input
                          class="input"
                          type="text"
                          id="zipCode"
                          placeholder="ZIP code"
                          required
                        />
                      </div>
                    </div>
                  </div>
                </div>

                <hr />

                <div class="field">
                  <label class="label">Password</label>
                  <div class="control">
                    <input
                      class="input"
                      type="password"
                      id="password"
                      placeholder="Create a password"
                      required
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Confirm Password</label>
                  <div class="control">
                    <input
                      class="input"
                      type="password"
                      id="confirmPassword"
                      placeholder="Confirm your password"
                      required
                    />
                  </div>
                </div>

                <div class="field">
                  <div class="control">
                    <button
                      type="submit"
                      class="button hero-button-primary is-fullwidth"
                    >
                      Sign Up
                    </button>
                  </div>
                </div>
              </form>

              <div class="has-text-centered mt-4">
                <p>
                  Already have an account?
                  <a href="login.html" class="has-text-weight-bold">Log in</a>
                </p>
              </div>
            </div>
          </div>
        </div>

        <footer class="has-text-centered mt-6">
          <p>&copy; 2025 Klade Photography</p>
        </footer>
      </div>
    </section>

    <script type="module" src="signup.js"></script>
  </body>
</html>
