<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klade Photography</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="section">
      <div class="container is-max-desktop">
        <h1 class="title is-2 has-text-black mb-5">Portfolio</h1>

        <nav
          class="navbar custom-navbar mb-6"
          role="navigation"
          aria-label="main navigation"
        >
          <div class="navbar-menu is-active">
            <div class="navbar-start nav-center">
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="homepage.html"
                >Home</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="about.html"
                >About</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="portfolio.html"
                >Portfolio</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="booking.html"
                >Book Appointment</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="review.html"
                >Reviews</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="contact.html"
                >Contact</a
              >
            </div>
          </div>
        </nav>
        <section class="mb-5">
          <h2 class="title is-4 has-text-black">
            A selection of our recent work
          </h2>
        </section>

        <section>
          <div class="columns is-multiline">
            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_1271.jpg" alt="Urban Sunset" />
                </figure>
                <p class="portfolio-label">Urban Sunset</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_3963.jpg" alt="Portrait Session" />
                </figure>
                <p class="portfolio-label">Portrait Session</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img
                    src="pictures/IMG_3708-Enhanced-NR.jpg"
                    alt="Mountain Landscape"
                  />
                </figure>
                <p class="portfolio-label">Mountain Landscape</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_4669.jpg" alt="Nature Photography" />
                </figure>
                <p class="portfolio-label">Nature Photography</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_5065.jpg" alt="Car Photography" />
                </figure>
                <p class="portfolio-label">Car Photography</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_1331.jpg" alt="City Portraits" />
                </figure>
                <p class="portfolio-label">City Portraits</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_4607.jpg" alt="Graduation Photos" />
                </figure>
                <p class="portfolio-label">Graduation Photos</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_5929.jpg" alt="Group Session" />
                </figure>
                <p class="portfolio-label">Group Session</p>
              </div>
            </div>

            <div class="column is-one-third-desktop is-half-tablet">
              <div class="portfolio-card">
                <figure class="image portfolio-image">
                  <img src="pictures/IMG_5289.jpg" alt="Star Photography" />
                </figure>
                <p class="portfolio-label">Star Photography</p>
              </div>
            </div>
          </div>
        </section>

        <footer class="has-text-centered mt-6">
          <p>&copy; 2025 Klade Photography</p>
        </footer>
      </div>
    </section>
  </body>
</html>
