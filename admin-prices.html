<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Prices - Klade Photography</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="section">
      <div class="container is-max-desktop">
        <div
          class="is-flex is-justify-content-space-between is-align-items-center mb-5 is-flex-wrap-wrap"
        >
          <h1 class="title is-2 has-text-black mb-0">Admin Photo Prices</h1>
          <div class="cart-status-box">Admin Dashboard</div>
        </div>

        <nav class="navbar custom-navbar mb-6">
          <div class="navbar-menu is-active">
            <div class="navbar-start nav-center">
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="homepage.html"
                >Home</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="portfolio.html"
                >Portfolio</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="admin-bookings.html"
                >Admin Bookings</a
              >
              <a
                class="navbar-item has-text-white has-text-weight-bold"
                href="admin-prices.html"
                >Admin Prices</a
              >
            </div>
          </div>
        </nav>

        <div
          id="adminPricesMessage"
          class="notification is-light is-hidden"
        ></div>

        <section class="home-info-box mb-5">
          <h2 class="title is-4 has-text-black mb-3">Set Photo Prices</h2>
          <p>
            Enter prices for the photos shown on the portfolio page. These
            prices will appear under each photo and be used during checkout.
          </p>
        </section>

        <section class="checkout-card">
          <form id="priceForm">
            <div id="priceFields"></div>

            <button class="button booking-button mt-4" type="submit">
              Save Prices
            </button>
          </form>
        </section>

        <footer class="has-text-centered mt-6">
          <p>&copy; 2026 Klade Photography</p>
        </footer>
      </div>
    </section>

    <script type="module" src="admin-guard.js"></script>
    <script type="module" src="admin-prices.js"></script>
    <script type="module" src="auth-ui.js"></script>
  </body>
</html>
